services:
  # Development: docker compose --profile dev up
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    profiles: [dev]
    ports:
      - "3000:3000"
    volumes:
      - ./apps:/app/apps
      - ./packages:/app/packages
      - ./.papi:/app/.papi
      - ./turbo.json:/app/turbo.json
      - ./tsconfig.json:/app/tsconfig.json
      # Prevent overwriting installed node_modules
      - /app/node_modules
      - /app/apps/web/node_modules
      - /app/packages/core/node_modules
      - /app/packages/ui/node_modules
    environment:
      - NODE_ENV=development

  # Production: docker compose --profile prod up
  prod:
    build:
      context: .
      dockerfile: Dockerfile
    profiles: [prod]
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
